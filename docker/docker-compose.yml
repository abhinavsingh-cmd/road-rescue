version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: road-rescue-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: road-rescue-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: road-rescue-frontend
    restart: unless-stopped
    env_file:
      - ../frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:
